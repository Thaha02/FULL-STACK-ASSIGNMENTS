<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hello Server App</title>

<style>
body { margin:0; font-family:Arial; transition:0.3s; }
body.light { background:#f4f4f4; color:black; }
body.dark { background:#121212; color:white; }

nav { background:#333; padding:15px; text-align:center; }
nav a { color:white; margin:10px; text-decoration:none; font-weight:bold; }
nav a.active { color:yellow; }

button { padding:6px 10px; margin-left:10px; }

.container { margin-top:50px; text-align:center; }

.card {
display:inline-block;
padding:25px;
border-radius:12px;
background:white;
color:black;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

body.dark .card {
background:#1e1e1e;
color:white;
}

input { padding:8px; margin:5px; }
</style>
</head>

<body class="light">

<nav>
<a href="/" id="home">Home</a>
<a href="/about" id="about">About</a>
<a href="/contact" id="contact">Contact</a>
<a href="/services" id="services">Services</a>
<button onclick="toggleMode()">Toggle Mode</button>
</nav>

<div class="container">
<div class="card" id="app"></div>
</div>

<script>
let isLoggedIn = false;

function toggleMode() {
document.body.classList.toggle("dark");
document.body.classList.toggle("light");
}

function setActive(path) {
document.querySelectorAll("nav a").forEach(a => a.classList.remove("active"));

if (path === "/") document.getElementById("home").classList.add("active");
else if (path === "/about") document.getElementById("about").classList.add("active");
else if (path === "/contact") document.getElementById("contact").classList.add("active");
else if (path === "/services") document.getElementById("services").classList.add("active");
}

function renderPage() {
let path = window.location.pathname;
let content = "";

// Force login
if (!isLoggedIn && path !== "/login") {
history.pushState({}, "", "/login");
path = "/login";
}

if (path === "/login") {
content = `
<h2>Login</h2>
<input id="user" placeholder="Username"><br>
<input id="pass" type="password" placeholder="Password"><br>
<button id="loginBtn">Login</button>
`;
}
else if (path === "/") {
content = "<h2>Home</h2><p>Welcome to Home Page 🚀</p>";
}
else if (path === "/about") {
content = "<h2>About</h2><p>This is About Page 👩‍💻</p>";
}
else if (path === "/contact") {
content = "<h2>Contact</h2><p>Phone: 9876543210</p>";
}
else if (path === "/services") {
content = "<h2>Services</h2><p>Web Development & Design</p>";
}
else {
content = "<h2>404</h2><p>Page Not Found ❌</p>";
}

document.getElementById("app").innerHTML = content;
setActive(path);

// Attach login button event AFTER render
if (path === "/login") {
document.getElementById("loginBtn").addEventListener("click", login);
}
}

function login() {
let user = document.getElementById("user").value.trim();
let pass = document.getElementById("pass").value.trim();

if (user === "admin" && pass === "1234") {
isLoggedIn = true;
history.pushState({}, "", "/");
renderPage();
} else {
alert("Invalid Login ❌");
}
}

// Navigation without reload
document.querySelectorAll("nav a").forEach(link => {
link.addEventListener("click", function(e) {
e.preventDefault();
history.pushState({}, "", this.getAttribute("href"));
renderPage();
});
});

window.addEventListener("load", renderPage);
window.addEventListener("popstate", renderPage);
</script>

</body>
</html>
