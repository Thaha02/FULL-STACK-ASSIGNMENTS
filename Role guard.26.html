<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Role Guard Demo</title>
    <style>
        body { 
            font-family: Arial; 
            text-align: center; 
            background: #f5f5f5;
        }
        .hidden { display: none; }
        .card {
            background: white;
            padding: 20px;
            margin: 30px auto;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        button { 
            margin: 10px; 
            padding: 10px 15px; 
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .admin { background: #ff4d4d; color: white; }
        .user { background: #4CAF50; color: white; }
        .logout { background: black; color: white; }
        .badge {
            padding: 5px 10px;
            border-radius: 5px;
            color: white;
            display: inline-block;
        }
    </style>
</head>
<body>

<h1>🛡️ Role Guard System</h1>

<!-- Login -->
<div id="loginPage" class="card">
    <h2>Login</h2>
    <button class="admin" onclick="login('admin')">Login as Admin</button>
    <button class="user" onclick="login('user')">Login as User</button>
</div>

<!-- Home -->
<div id="homePage" class="hidden card">
    <h2>Home Page</h2>
    <p id="welcomeText"></p>
    <p id="roleBadge"></p>

    <button id="adminBtn" onclick="goTo('adminPage')">Admin Page</button>
    <button onclick="goTo('userPage')">User Page</button>
    <br>
    <button class="logout" onclick="logout()">Logout</button>
</div>

<!-- Admin -->
<div id="adminPage" class="hidden card">
    <h2>Admin Page</h2>
    <p>🔒 Only Admin can see this.</p>
    <button onclick="goTo('homePage')">Back</button>
</div>

<!-- User -->
<div id="userPage" class="hidden card">
    <h2>User Page</h2>
    <p>✅ Both Admin & User can see this.</p>
    <button onclick="goTo('homePage')">Back</button>
</div>

<script>
    function login(role) {
        localStorage.setItem("role", role);
        setupUI(role);
        showPage("homePage");
    }

    function logout() {
        localStorage.removeItem("role");
        showPage("loginPage");
    }

    function getRole() {
        return localStorage.getItem("role");
    }

    function showPage(pageId) {
        document.querySelectorAll("div").forEach(div => div.classList.add("hidden"));
        document.getElementById(pageId).classList.remove("hidden");
    }

    // 🔐 Role Guard Function
    function roleGuard(page) {
        const role = getRole();

        if (!role) {
            alert("Please login first!");
            showPage("loginPage");
            return false;
        }

        if (page === "adminPage" && role !== "admin") {
            alert("Access Denied! Admins only.");
            return false;
        }

        return true;
    }

    function goTo(page) {
        if (roleGuard(page)) {
            showPage(page);
        }
    }

    // 🎯 Setup UI based on role
    function setupUI(role) {
        document.getElementById("welcomeText").innerText = "Logged in as: " + role;

        const badge = document.getElementById("roleBadge");
        badge.innerHTML = `<span class="badge" style="background:${role === 'admin' ? 'red' : 'green'}">
            ${role.toUpperCase()}
        </span>`;

        // Hide admin button for users
        if (role === "user") {
            document.getElementById("adminBtn").style.display = "none";
        } else {
            document.getElementById("adminBtn").style.display = "inline-block";
        }
    }

    // 🔁 Auto Login
    window.onload = function () {
        const role = getRole();
        if (role) {
            setupUI(role);
            showPage("homePage");
        } else {
            showPage("loginPage");
        }
    }
</script>

</body>
</html>
