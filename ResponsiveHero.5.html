<!DOCTYPE html>
<html>
<head>
<title>Responsive Hero Page</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="/index.html/hero.css">
</head>

<body>
    <style>

body {
    margin: 0;
    font-family: Arial;
}


.hero {
    display: flex;             
    background-color: rgb(212, 85, 107);
    color: black;
    padding: 30px;
    align-items: center;
    justify-content: space-between;
    min-height: 100vh;
}

.text {
    width: 50%;
}

h1 {
    font-size: 36px;
}

p {
    font-size: 18px;
}

button {
    padding: 10px 18px;
    border: none;
    background-color: white;
    color: blue;
    font-weight: bold;
    cursor: pointer;
}

.image {
    width: 40%;
}

.image img {
    width: 100%;
}


@media (max-width: 768px) {
    .hero {
    flex-direction: column;   
    text-align: center;
    }

    .text,
    .image {
    width: 100%;
    }

    h1    {
    font-size: 28px;
    }
}
</style>

<div class="hero">

    <div class="text">
        <h1> Welcome to my website </h1>
        <h1>Skin Care Product</h1>
    <p>
    This product helps to moisturize and protect the skin.<br>
    It can be used daily for better skin care.
</p>
<button>Order now</button>
        
    </div>

    <div class="image">
        <img src="https://cdn-icons-png.flaticon.com/512/4140/4140051.png" alt="Skincare Girl">
    </div>

    </div>

</body>
</html>
